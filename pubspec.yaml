name: quran_app
description: A modern, accurate, and respectful Qur'an application with authentic Uthmani Arabic text, English and Bangla translations, audio recitation, and offline support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Audio Player
  just_audio: ^0.9.36
  audio_service: ^0.18.10
  
  # HTTP & Data
  http: ^1.1.0
  dio: ^5.4.0
  
  # UI & Utilities
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  intl: ^0.18.1
  
  # Search & Text
  flutter_staggered_animations: ^1.1.1
  animations: ^2.0.11
  flutter_animate: ^4.5.0

  # Color Picker
  flutter_colorpicker: ^1.1.0
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # App Info
  package_info_plus: ^8.0.0
  
  # Location & Prayer Times
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Prayer Times Calculation
  adhan: ^2.0.0+1
  
  # Share & Social
  share_plus: ^10.0.0
  path_provider: ^2.1.1
  
  # Analytics & Crash Reporting
  firebase_core: ^2.24.2
  firebase_analytics: ^10.7.4
  firebase_crashlytics: ^3.4.9
  
  # Sensors (Compass)
  sensors_plus: ^6.0.0
  
  # Onboarding
  introduction_screen: ^3.1.14
  
  # Image handling
  image: ^4.1.3
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_timezone: ^4.1.1
  
  # Charts & Analytics
  fl_chart: ^0.69.0
  
  # Download Manager
  flutter_downloader: ^1.11.6
  
  # Permissions
  permission_handler: ^11.0.1
  
  # Speech Recognition (for memorization)
  speech_to_text: ^7.0.0
  
  # Audio Recording
  record: ^6.1.2
  
  # UUID for unique IDs
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#0B4A30"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  
  assets:
    - assets/data/
    - assets/audio/
    - assets/fonts/
  
  # Fonts for Quranic text rendering
  fonts:
    # Premium Indo-Pak font (Hafizi style)
    - family: PDMSSaleem
      fonts:
        - asset: assets/fonts/PDMS-Saleem-QuranFont.ttf

    # Premium Uthmani Hafs font (standard Madani Mushaf)
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs-Regular.ttf

    # Premium Quranic font (Best diacritics)
    - family: Scheherazade
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
        - asset: assets/fonts/ScheherazadeNew-Bold.ttf
          weight: 700

    # Primary Arabic font (fallback)
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    
    # Alternative Arabic font
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700
    
    # Bangla fonts for translations
    - family: NotoSansBengali
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
        - asset: assets/fonts/NotoSansBengali-Bold.ttf
          weight: 700
